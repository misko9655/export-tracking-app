<div class="confirmation-dialog">
    <h2 matDialogTitle>{{data.title}}</h2>
    <mat-dialog-content>
        <p>{{data.message}}</p>

    </mat-dialog-content>
    <mat-dialog-actions>
        <button class="btn" matButton="filled" (click)="onConfirm()">Potvrdi</button>
        <button class="btn" matButton="filled" (click)="onClose()">Zatvori</button>
    </mat-dialog-actions>
</div>
