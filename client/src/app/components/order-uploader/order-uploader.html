<div class="container">
      <input
        #fileInput
        type="file"
        accept=".xlsx, .xls, .xlsm"
        style="display: none"
        (change)="onFileChange($event)"
      />
      <button (click)="fileInput.click()" [disabled]="loading()">
        {{ loading() ? 'Učitavanje...' : '📊 Importuj Excel fajl' }}
      </button>
      
      @if (loading()) {
        <div class="loading">
          ⏳ Učitavanje artikala...
        </div>
      }
      
      @if (errorMessage) {
        <div class="error">
          ❌ {{errorMessage}}
        </div>
      }
    </div>
