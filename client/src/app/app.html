<mat-sidenav-container fullscreen>
  <mat-sidenav #sidenav>
    <mat-nav-list (click)="sidenav.close()">
      <a mat-list-item routerLink="customers">
        <mat-icon>library_books</mat-icon>
        <span>Export - Trebovanja</span>
      </a>
      <a mat-list-item routerLink="production">
        <mat-icon>factory</mat-icon>
        <span>Proizvodnja</span>
      </a>
      <a mat-list-item routerLink="supply">
        <mat-icon>inventory</mat-icon>
        <span>Nabavka</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-toolbar class="mat-bg-primary-container mat-text-on-primary-container mat-border-variant mat-font-body-lg">
    <button mat-icon-button (click)="sidenav.open()">
      <mat-icon>menu</mat-icon>
    </button>
    <span>Export-tracking app</span>
  </mat-toolbar>

  <router-outlet />

</mat-sidenav-container>
